<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
transition:0.3s;
}

/* ТЕМЫ */
body.white{background:#fff;color:#000;}
body.black{background:#000;color:#fff;}
body.blue{background:#0f172a;color:#fff;}

header{
display:flex;
justify-content:space-between;
padding:15px;
font-weight:bold;
}

#menuBtn{cursor:pointer;font-size:22px;}

#menu{
position:absolute;
right:15px;
top:60px;
background:#1e1e1e;
padding:15px;
border-radius:12px;
display:none;
flex-direction:column;
gap:10px;
z-index:100;
}

#menu button{
background:none;
border:none;
color:white;
cursor:pointer;
text-align:left;
}

/* ЧАТ */
#chat{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
white-space:pre-wrap;
}

.message{
max-width:75%;
word-wrap:break-word;
}

.me{
align-self:flex-end;
background:#3a3a3a;
color:white;
padding:10px 14px;
border-radius:18px;
}

.bot{
align-self:flex-start;
}

/* АНИМАЦИЯ БУКВ */
.fadeLetter{
opacity:0;
animation:fade 0.3s forwards;
}
@keyframes fade{to{opacity:1;}}

/* ТОЧКИ */
.dots span{
font-size:32px;
display:inline-block;
animation:bounce 1s infinite;
}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

/* INPUT */
#inputArea{
display:flex;
padding:10px;
gap:10px;
}
#plus{font-size:22px;cursor:pointer;}
#input{
flex:1;
padding:10px;
border-radius:12px;
border:none;
outline:none;
}
#send{
padding:10px 15px;
border:none;
border-radius:12px;
cursor:pointer;
}
</style>
</head>

<body class="blue">

<header>
DeepCore
<div id="menuBtn">⋮</div>
</header>

<div id="menu">
<button onclick="setTheme('white')">Белая</button>
<button onclick="setTheme('blue')">Синяя</button>
<button onclick="setTheme('black')">Чёрная</button>
<button onclick="toggleThink()">Думать: <span id="thinkState">OFF</span></button>
</div>

<div id="chat"></div>

<div id="inputArea">
<div id="plus" onclick="plusMenu()">＋</div>
<input id="input">
<button id="send">➤</button>
</div>

<script>

/* ===== СЛОВАРЬ ===== */
const greetings=["Кого я вижу! 😎","Привет!","О, какие люди!","Йо!"];
const howAreYou=["Лучше всех, а жаловаться грех!","Нормально, живем.","Всё сложно... но интересно!"];

let thinking=false;

/* МЕНЮ */
const menu=document.getElementById("menu");
const menuBtn=document.getElementById("menuBtn");

menuBtn.onclick=()=>menu.style.display=menu.style.display==="flex"?"none":"flex";

document.addEventListener("click",(e)=>{
if(!menu.contains(e.target)&&e.target!==menuBtn){
menu.style.display="none";
}
});

function setTheme(t){document.body.className=t;}
function toggleThink(){
thinking=!thinking;
document.getElementById("thinkState").innerText=thinking?"ON":"OFF";
}

/* ОТПРАВКА */
const sendBtn=document.getElementById("send");
const input=document.getElementById("input");
const chat=document.getElementById("chat");

sendBtn.onclick=sendMessage;
input.addEventListener("keydown",e=>{if(e.key==="Enter")sendMessage();});

function sendMessage(){
let text=input.value.trim();
if(!text)return;

addMessage(text,"me");
input.value="";

if(thinking)thinkingFlow(text);
else dotsFlow(text);
}

function addMessage(text,type){
let div=document.createElement("div");
div.className="message "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

/* THINK */
function thinkingFlow(text){
let div=document.createElement("div");
div.className="message bot";
chat.appendChild(div);

let states=["Думаю","Продумываю ещё раз","Формулирую ответ"];
let i=0;

let interval=setInterval(()=>{
div.innerText=states[i];
i++;
if(i>=states.length){
clearInterval(interval);
setTimeout(()=>typeAnswer(text,div),1000);
}
},1500);
}

function dotsFlow(text){
let div=document.createElement("div");
div.className="message bot dots";
div.innerHTML="<span>●</span><span>●</span><span>●</span>";
chat.appendChild(div);

setTimeout(()=>typeAnswer(text,div),4500);
}

/* ПЕЧАТЬ */
function typeAnswer(text,div){
let answer=generate(text);
div.innerHTML="";
let i=0;
let interval=setInterval(()=>{
let span=document.createElement("span");
span.className="fadeLetter";
span.innerText=answer[i];
div.appendChild(span);
i++;
if(i>=answer.length)clearInterval(interval);
},15);
}

/* ЛОГИКА */
function generate(text){
let t=text.toLowerCase();

if(t.includes("привет"))return greetings[Math.floor(Math.random()*greetings.length)];
if(t.includes("как дела"))return howAreYou[Math.floor(Math.random()*howAreYou.length)];
if(!isNaN(text))return "Ответ калькулятора: "+eval(text);

return "Интересный вопрос 😎";
}

/* ПЛЮС */
function plusMenu(){
alert("У DeepCore пока нет такой функции 😅");
}

</script>
</body>
  </html>
