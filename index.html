<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>DeepCore 🚀</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 40vh;
      font-size: 32px;
    }

    button {
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 18px;
      background: red;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: darkred;
    }
  </style>
</head>

<body>

  <h1>DeepCore 🚀</h1>
  <button onclick="alert('DeepCore активирован 😈')">
    Запустить
  </button>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log("Service Worker зарегистрирован"))
        .catch(err => console.log("Ошибка SW:", err));
    }
  </script>

</body>
</html>
