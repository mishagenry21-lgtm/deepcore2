<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore v5.1</title>

<style>
:root{
--bg:#e6e6e6;
--text:#000;
--user:#dcdcdc;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
overflow:hidden;
}

/* Overlay */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
opacity:0;
visibility:hidden;
transition:.3s;
z-index:9;
}
.overlay.active{
opacity:1;
visibility:visible;
}

/* Sidebar */
.sidebar{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
background:#f2f2f2;
transform:translateX(-100%);
transition:transform .3s ease;
z-index:10;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
overflow-y:auto;
}
.sidebar.active{
transform:translateX(0);
}
.sidebar button{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

/* Main */
.main{
flex:1;
display:flex;
flex-direction:column;
width:100%;
}

header{
display:flex;
justify-content:space-between;
padding:12px;
}

.icon{
width:36px;
height:36px;
border-radius:50%;
border:1px solid #888;
background:white;
cursor:pointer;
}

/* Chat */
#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
}

.logo{
text-align:center;
opacity:.3;
margin-top:40px;
}

.msg{
max-width:75%;
font-size:15px;
white-space:pre-wrap;
}

.user{
align-self:flex-end;
background:var(--user);
padding:10px 14px;
border-radius:16px;
}

.bot{
align-self:flex-start;
}

/* Typing dots */
.typing{
display:flex;
gap:5px;
}
.dot{
width:6px;
height:6px;
border-radius:50%;
background:#000;
animation:bounce 1.4s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{
0%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-6px);}
}

/* Footer */
footer{
display:flex;
gap:6px;
padding:10px;
}
input{
flex:1;
padding:10px;
border-radius:12px;
border:1px solid #ccc;
outline:none;
}
#send{
opacity:.5;
transition:.3s;
}
#send.active{
opacity:1;
}
</style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
<button onclick="newChat()">➕ Новый чат</button>
<div id="chatList"></div>
<button onclick="fake()">Изображения</button>
<button onclick="fake()">Приложения</button>
<button onclick="fake()">Новый проект</button>
</div>

<div class="main">
<header>
<button class="icon" id="menuBtn">☰</button>
<div>DeepCore</div>
<button class="icon">🌓</button>
</header>

<div id="chat">
<div class="logo">
<h2>Привет, я DeepCore</h2>
<p>Чем могу помочь вам сегодня?</p>
</div>
</div>

<footer>
<input id="input" placeholder="Спросить DeepCore">
<button id="send">➤</button>
</footer>
</div>

<script>
const input=document.getElementById("input");
const send=document.getElementById("send");
const chat=document.getElementById("chat");
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");
const chatList=document.getElementById("chatList");
const menuBtn=document.getElementById("menuBtn");

let chats=JSON.parse(localStorage.getItem("deepcore_v51"))||[];
let currentChat=[];

/* Sidebar control */
menuBtn.onclick=()=>{
sidebar.classList.toggle("active");
overlay.classList.toggle("active");
};
overlay.onclick=()=>{
sidebar.classList.remove("active");
overlay.classList.remove("active");
};

/* Save chats */
function save(){
localStorage.setItem("deepcore_v51",JSON.stringify(chats));
renderChats();
}
function renderChats(){
chatList.innerHTML="";
chats.forEach((c,i)=>{
let btn=document.createElement("button");
btn.textContent=c[0]?.text?.slice(0,20)||"Чат";
btn.onclick=()=>loadChat(i);
chatList.appendChild(btn);
});
}
function newChat(){
if(currentChat.length){
chats.push(currentChat);
save();
}
currentChat=[];
chat.innerHTML="";
sidebar.classList.remove("active");
overlay.classList.remove("active");
}
function loadChat(i){
chat.innerHTML="";
currentChat=chats[i];
currentChat.forEach(m=>{
if(m.role==="user") addUser(m.text);
else addBotInstant(m.text);
});
sidebar.classList.remove("active");
overlay.classList.remove("active");
}

/* Messages */
function addUser(text){
const msg=document.createElement("div");
msg.className="msg user";
msg.textContent=text;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
}

function addBot(text){
const msg=document.createElement("div");
msg.className="msg bot";
chat.appendChild(msg);
typeWriter(msg,text,20);
}

function addBotInstant(text){
const msg=document.createElement("div");
msg.className="msg bot";
msg.textContent=text;
chat.appendChild(msg);
}

function typeWriter(element,text,speed){
let i=0;
function typing(){
if(i<text.length){
element.textContent+=text.charAt(i);
i++;
chat.scrollTop=chat.scrollHeight;
setTimeout(typing,speed);
}
}
typing();
}

/* Typing dots */
function showTyping(){
const t=document.createElement("div");
t.className="typing";
t.id="typing";
t.innerHTML="<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
chat.appendChild(t);
chat.scrollTop=chat.scrollHeight;
}
function removeTyping(){
document.getElementById("typing")?.remove();
}

/* Input */
input.addEventListener("input",()=>{
send.classList.toggle("active",input.value.trim());
});
send.onclick=()=>{
if(!input.value.trim())return;
let text=input.value;
addUser(text);
currentChat.push({role:"user",text});
input.value="";
showTyping();
setTimeout(()=>{
removeTyping();
let r=generate(text.toLowerCase());
addBot(r);
currentChat.push({role:"bot",text:r});
},2000);
};

/* Smart brain */

const hello=[
"Кого я вижу!",
"Ну наконец-то! А то я уже заскучал.",
"Йо!",
"Мир твоему дому!",
"Приветствую!"
];

const how=[
"Лучше всех, а жаловаться грех!",
"Как в автобусе — трясет, но едем.",
"Да бывает по-всякому, но держусь.",
"В полном порядке 😎"
];

const fallback=[
"Давай-ка поподробнее, а то я не уловил суть.",
"Можно чуть понятнее?",
"Интересная мысль… разверни её.",
"Я чувствую, тут есть глубина 😈"
];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(t){

if(t.includes("привет")) return random(hello);
if(t.includes("как дела")) return random(how);

if(/^[0-9+\-*/(). ]+$/.test(t)){
try{return "Ответ: "+eval(t);}catch{return "Ошибка вычисления";}
}

if(t.includes("?")){
return "Хм 🤔 Интересный вопрос. Пока скажу так: всё возможно, если копнуть глубже.";
}

return random(fallback);
}

renderChats();
</script>

</body>
  </html>
