<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore 4.1</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
height:100vh;
transition:0.3s;
}

body.white{background:#ffffff;color:#000;}
body.black{background:#000000;color:#fff;}
body.blue{background:#0f172a;color:#fff;}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
font-weight:bold;
}

#menuBtn{cursor:pointer;font-size:22px;}

#menu{
position:absolute;
right:15px;
top:60px;
background:#1e1e1e;
padding:15px;
border-radius:12px;
display:none;
flex-direction:column;
gap:10px;
z-index:100;
}

#menu button{
background:none;
border:none;
color:white;
cursor:pointer;
text-align:left;
font-size:14px;
}

#chat{
flex:1;
padding:20px;
overflow-y:auto;
white-space:pre-wrap;
}

.message{
margin-bottom:15px;
animation:fadeIn 0.4s ease;
}

.me{
font-weight:bold;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.fadeText{
opacity:0;
animation:fadeLetters 0.4s forwards;
}

@keyframes fadeLetters{
from{opacity:0;}
to{opacity:1;}
}

#inputArea{
display:flex;
padding:10px;
gap:10px;
}

#plus{
font-size:22px;
cursor:pointer;
}

#input{
flex:1;
padding:10px;
border-radius:12px;
border:none;
outline:none;
}

#send{
padding:10px 15px;
border:none;
border-radius:12px;
cursor:pointer;
}

.dots span{
display:inline-block;
animation:bounce 1s infinite;
}

.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}
</style>
</head>

<body class="black">

<header>
DeepCore
<div id="menuBtn">⋮</div>
</header>

<div id="menu">
<button onclick="setTheme('white')">Белая</button>
<button onclick="setTheme('blue')">Синяя</button>
<button onclick="setTheme('black')">Чёрная</button>
<button onclick="toggleThinking()">Думать: <span id="thinkState">OFF</span></button>
</div>

<div id="chat"></div>

<div id="inputArea">
<div id="plus" onclick="plusMenu()">＋</div>
<input id="input" placeholder="">
<button id="send">➤</button>
</div>

<script>

/* ===== СЛОВАРНЫЙ ЗАПАС ===== */

const greetings = [
"Кого я вижу! 😎","О, привет! А я как раз заказывал пиццу, тебе кусочек? 🍕",
"Ну наконец-то! А то я уже заскучал.","Привет! Как там жизнь молодая?",
"Мир твоему дому!","Доброго времени суток!","Мое почтение.",
"Приветствую!","Здравствуй(те)!","Салют!","Здарова!",
"Хай!","О, какие люди!","Здорово, коль не шутишь.",
"Йо!","Привет-привет!"
];

const howAreYou = [
"Лучше всех, а жаловаться грех!","Нормально, как в автобусе — трясет, но едем.",
"Дела — как сажа бела? Шучу, отлично! 😄",
"Идут потихоньку, ладно хоть не ползком.",
"Как в сказке: чем дальше, тем страшнее! 😅",
"Жду зарплату/лето/понедельник (нужное подчеркнуть).",
"В полном порядке, даже не спрашивай!",
"Да бывает по-всякому, но держусь.",
"Могло быть лучше, но судя по всему — не сегодня.",
"Если честно — устал как собака.",
"Всё сложно... но интересно!",
"Дела у прокурора, а у меня делишки. А у тебя?",
"Есть две новости: хорошая и плохая. С какой начнем?",
"А что, уже спрашивают?",
"Жаловаться не буду, но похвастаться нечем. А у тебя как?"
];

let thinking=false;

/* ===== МЕНЮ ===== */

menuBtn.onclick=()=>menu.style.display=menu.style.display==="flex"?"none":"flex";
document.addEventListener("click",(e)=>{
if(!menu.contains(e.target)&&e.target!==menuBtn){menu.style.display="none";}
});

function setTheme(t){document.body.className=t;}
function toggleThinking(){
thinking=!thinking;
thinkState.innerText=thinking?"ON":"OFF";
}

/* ===== ОТПРАВКА ===== */

send.onclick=sendMessage;
input.addEventListener("keydown",(e)=>{if(e.key==="Enter")sendMessage();});

function sendMessage(){
let text=input.value.trim();
if(!text)return;

addMessage("Ты: "+text,"me");
input.value="";

if(thinking){thinkingFlow(text);}
else{dotsFlow(text);}
}

/* ===== ДОБАВЛЕНИЕ СООБЩЕНИЯ ===== */

function addMessage(text,type){
let msg=document.createElement("div");
msg.className="message "+type;
msg.innerText=text;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
}

/* ===== THINK FLOW ===== */

function thinkingFlow(text){
let msg=document.createElement("div");
msg.className="message";
chat.appendChild(msg);

let states=["Думаю","Продумываю ещё раз","Формулирую ответ"];
let i=0;

let interval=setInterval(()=>{
msg.innerText=states[i];
i++;
if(i>=states.length){
clearInterval(interval);
setTimeout(()=>typeAnswer(text,msg),1000);
}
},1500);
}

function dotsFlow(text){
let msg=document.createElement("div");
msg.className="message dots";
msg.innerHTML="<span>.</span><span>.</span><span>.</span>";
chat.appendChild(msg);

setTimeout(()=>typeAnswer(text,msg),4500);
}

/* ===== ПЕЧАТЬ С АНИМАЦИЕЙ ===== */

function typeAnswer(text,element){
let answer=generateAnswer(text);
element.innerHTML="";
let i=0;

let interval=setInterval(()=>{
let span=document.createElement("span");
span.className="fadeText";
span.innerText=answer[i];
element.appendChild(span);
i++;
if(i>=answer.length)clearInterval(interval);
},15);
}

/* ===== ЛОГИКА ===== */

function generateAnswer(text){
let lower=text.toLowerCase();

if(lower==="/help"){
return `Я - DeepCore. Меня так зовут, ведь я ИИ 😎

Мои функции:
• Переводчик
• Калькулятор
• Текст наоборот
• /Bigresponse

Словарный запас: Большой`;
}

if(lower==="/bigresponse"){
return `Квантовый компьютер — это вычислительная система нового поколения.
Он работает не с битами, а с кубитами.
Кубит может быть 0 и 1 одновременно.
Это называется суперпозиция.
Также существует квантовая запутанность.
Она связывает кубиты особым образом.
Благодаря этому вычисления идут параллельно.
Это даёт огромный прирост мощности.
Такие системы могут моделировать молекулы.
Разрабатывать новые лекарства.
Оптимизировать логистику.
Улучшать машинное обучение.
Работать с криптографией.
Однако технология ещё развивается.
Кубиты нестабильны.
Чувствительны к шуму.
Требуют сверхнизких температур.
Но за ними будущее вычислений.
И это только начало 🚀`;
}

if(lower.includes("привет"))return greetings[Math.floor(Math.random()*greetings.length)];
if(lower.includes("как дела"))return howAreYou[Math.floor(Math.random()*howAreYou.length)];

if(lower.startsWith("переведи "))return text.replace(/переведи /i,"");
if(lower.startsWith("наоборот "))return text.replace(/наоборот /i,"").split("").reverse().join("");

if(!isNaN(text))return "Ответ калькулятора: "+eval(text);

return "Интересный вопрос 😎";
}

/* ===== ПЛЮС ===== */

function plusMenu(){
alert("У DeepCore пока нет такой функции 😅");
}

/* ===== PLACEHOLDER ===== */

const phrases=[
"DeepCore не спит","DeepCore крутой","Кстати, DeepCore 4.1 v8",
"Спрашивай что угодно","DeepCore шарит 😎",
"DeepCore рил мощный ИИ, да да","Попробуй /Bigresponse 🚀"
];

let pIndex=0,cIndex=0,del=false;

function animatePlaceholder(){
let current=phrases[pIndex];
if(!del){
input.placeholder=current.substring(0,cIndex++);
if(cIndex>current.length){del=true;setTimeout(animatePlaceholder,1000);return;}
}else{
input.placeholder=current.substring(0,cIndex--);
if(cIndex===0){del=false;pIndex=(pIndex+1)%phrases.length;}
}
setTimeout(animatePlaceholder,80);
}
animatePlaceholder();

</script>
</body>
  </html>
