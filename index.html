<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore</title>

<style>
:root{
--bg:#e6e6e6;
--text:#000;
--user:#d9d9d9;
}

.dark{
--bg:#0f0f0f;
--text:#fff;
--user:#2a2a2a;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
transition:.3s;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:var(--bg);
border-right:1px solid #ccc;
padding:15px;
position:fixed;
left:-260px;
top:0;
height:100%;
transition:.3s;
display:flex;
flex-direction:column;
gap:10px;
z-index:5;
}

.sidebar.active{
left:0;
}

.sidebar button{
padding:10px;
border-radius:10px;
border:1px solid #999;
background:transparent;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
width:100%;
}

header{
display:flex;
justify-content:space-between;
padding:12px;
}

button.icon{
border-radius:50%;
width:36px;
height:36px;
border:1px solid #888;
background:transparent;
cursor:pointer;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
}

.logo{
text-align:center;
opacity:.3;
margin-top:40px;
}

/* MESSAGES */

.msg{
max-width:75%;
font-size:15px;
opacity:0;
animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
from{opacity:0;filter:brightness(0);}
to{opacity:1;filter:brightness(1);}
}

.user{
align-self:flex-end;
background:var(--user);
padding:10px 14px;
border-radius:16px;
}

.bot{
align-self:flex-start;
}

.actions{
display:flex;
gap:6px;
margin-top:6px;
}

.actions span{
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #000;
background:#fff;
color:#000;
cursor:pointer;
font-size:13px;
}

/* TYPING */

.typing{
display:flex;
gap:5px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:var(--text);
animation:bounce 1.4s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-6px);}
}

/* FOOTER */

footer{
display:flex;
gap:6px;
padding:10px;
position:relative;
}

input{
flex:1;
padding:10px;
border-radius:12px;
border:1px solid #ccc;
outline:none;
}

#send{
opacity:.5;
transition:.3s;
}

#send.active{
opacity:1;
}

/* PLUS MENU */

.plusMenu{
position:absolute;
bottom:60px;
left:10px;
background:#fff;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
padding:10px;
display:none;
flex-direction:column;
gap:6px;
z-index:10;
}

.plusMenu button{
display:flex;
justify-content:space-between;
border:none;
background:none;
padding:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">
<button onclick="newChat()">Новый чат</button>
<button onclick="fake()">Изображения</button>
<button onclick="fake()">Приложения</button>
<button onclick="fake()">Новый проект</button>
<button onclick="showChats()">Все чаты</button>
</div>

<div class="main">

<header>
<button class="icon" onclick="toggleSidebar()">☰</button>
<button class="icon" onclick="toggleTheme()">🌓</button>
</header>

<div id="chat">
<div class="logo">
<h2>Привет, я DeepCore</h2>
<p>Чем могу помочь вам сегодня?</p>
</div>
</div>

<footer>
<button class="icon" onclick="togglePlus()">＋</button>
<div class="plusMenu" id="plusMenu">
<button onclick="fake()">📷 Фотографии</button>
<button onclick="fake()">📸 Камера</button>
<button onclick="fake()">📁 Файлы</button>
<button onclick="fake()">🎨 Создать изображение</button>
<button onclick="fake()">🧠 Думаю</button>
<button onclick="fake()">🔬 Глубокое исследование</button>
<button onclick="fake()">🛍 Поиск покупок</button>
<button onclick="fake()">🌐 Поиск в сети</button>
<button onclick="fake()">📚 Учеба и обучение</button>
<button onclick="fake()">❓ Викторины</button>
<button onclick="fake()">🧩 Исследовать приложения</button>
</div>
<input id="input">
<button id="send">➤</button>
</footer>

</div>

<script>
const input=document.getElementById("input");
const send=document.getElementById("send");
const chat=document.getElementById("chat");

const placeholders=[
"Спросить DeepCore",
"А вы знали что DeepCore сделал Миша? 😎",
"DeepCore Это рил мощный ИИ, да да",
"DeepCore лучший друг ChatGPT"
];

function randomPlaceholder(){
if(Math.random()<0.75){
input.placeholder="Спросить DeepCore";
}else{
input.placeholder=placeholders[Math.floor(Math.random()*placeholders.length)];
}
}
randomPlaceholder();

input.addEventListener("focus",randomPlaceholder);

input.addEventListener("input",()=>{
send.classList.toggle("active",input.value.trim().length>0);
});

send.onclick=()=>{
if(!input.value.trim())return;
addMsg(input.value,"user");
let text=input.value;
input.value="";
showTyping();
setTimeout(()=>{
removeTyping();
addMsg(generate(text),"bot",true);
},4000);
};

function addMsg(text,type,actions=false){
const msg=document.createElement("div");
msg.className="msg "+type;
msg.textContent=text;
chat.appendChild(msg);

if(actions){
const act=document.createElement("div");
act.className="actions";
act.innerHTML="<span>📋</span><span>👍</span><span>👎</span><span>⋯</span>";
msg.appendChild(act);
}
chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
const t=document.createElement("div");
t.className="typing";
t.id="typing";
t.innerHTML="<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
chat.appendChild(t);
}

function removeTyping(){
document.getElementById("typing")?.remove();
}

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("active");
}

function togglePlus(){
document.getElementById("plusMenu").style.display=
document.getElementById("plusMenu").style.display==="flex"?"none":"flex";
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

function fake(){
alert("У DeepCore пока нет такой функции 😅");
}

function newChat(){
chat.innerHTML="";
}

function showChats(){
alert("У DeepCore пока нет такой функции 😅");
}

function generate(text){
return "Интересно... расскажи подробнее.";
}
</script>

</body>
  </html>
