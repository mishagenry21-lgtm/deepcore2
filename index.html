<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore</title>

<style>
:root{
--bg:#ffffff;
--text:#000;
--bot:#000;
--user:#1e90ff;
--border:#000;
--input:#f3f3f3;
}

.dark{
--bg:#0f0f0f;
--text:#fff;
--bot:#111;
--user:#2563eb;
--border:#fff;
--input:#1a1a1a;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
transition:0.3s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
border-bottom:1px solid var(--border);
}

button{
background:none;
border:1px solid var(--border);
color:var(--text);
padding:6px 12px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

.msg{
max-width:75%;
padding:10px 14px;
border-radius:16px;
position:relative;
animation:fade 0.4s ease forwards;
}

.user{
align-self:flex-end;
background:var(--user);
color:#fff;
}

.bot{
align-self:flex-start;
background:var(--bot);
color:#fff;
}

.msg-actions{
display:flex;
gap:8px;
font-size:12px;
opacity:0.6;
margin-top:5px;
}

.msg-actions span{
cursor:pointer;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

.typing{
display:flex;
gap:5px;
align-self:flex-start;
margin-bottom:10px;
}

.dot{
width:7px;
height:7px;
border-radius:50%;
background:var(--text);
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-8px);}
}

.thinking{
align-self:flex-start;
font-size:12px;
opacity:0.4;
position:relative;
overflow:hidden;
}

.thinking::after{
content:"";
position:absolute;
top:0;left:-100%;
width:100%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);
animation:shine 1.5s infinite;
}

@keyframes shine{
100%{left:100%;}
}

footer{
display:flex;
padding:10px;
gap:5px;
border-top:1px solid var(--border);
}

input{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--input);
color:var(--text);
outline:none;
}

#send{
background:gray;
color:black;
}

#send.active{
background:white;
color:black;
}
</style>
</head>

<body>

<header>
<div>
<button onclick="toggleMenu()">☰</button>
<button onclick="newChat()">＋</button>
</div>
<button onclick="toggleTheme()">🌓</button>
</header>

<div id="chat"></div>

<footer>
<input type="file" id="file" hidden>
<button onclick="upload()">＋</button>
<input id="input" placeholder="Спросить DeepCore">
<button id="send" disabled>➤</button>
</footer>

<script>
const input=document.getElementById("input");
const send=document.getElementById("send");
const chat=document.getElementById("chat");

let chats=JSON.parse(localStorage.getItem("deepcoreChats"))||[];
let currentChat=[];

function saveChats(){
localStorage.setItem("deepcoreChats",JSON.stringify(chats));
}

function newChat(){
if(currentChat.length>0){
chats.push(currentChat);
saveChats();
}
currentChat=[];
chat.innerHTML="";
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

function upload(){
document.getElementById("file").click();
}

document.getElementById("file").onchange=function(){
addMessage("📸 Фото загружено (визуально 😅)","user");
};

input.addEventListener("input",()=>{
if(input.value.trim()){
send.disabled=false;
send.classList.add("active");
}else{
send.disabled=true;
send.classList.remove("active");
}
});

send.onclick=()=>{
if(!input.value.trim())return;
addMessage(input.value,"user");
currentChat.push({role:"user",text:input.value});
const text=input.value;
input.value="";
send.disabled=true;
send.classList.remove("active");
showTyping();
setTimeout(()=>{
removeTyping();
let response=generateResponse(text);
addMessage(response,"bot",true);
currentChat.push({role:"bot",text:response});
},3000+Math.random()*2000);
};

function addMessage(text,type,actions=false){
const msg=document.createElement("div");
msg.className="msg "+type;
chat.appendChild(msg);

let i=0;
const interval=setInterval(()=>{
msg.textContent+=text[i];
i++;
if(i>=text.length){
clearInterval(interval);
if(actions){
addActions(msg,text);
}
}
},15);

chat.scrollTop=chat.scrollHeight;
}

function addActions(msg,text){
const actions=document.createElement("div");
actions.className="msg-actions";
actions.innerHTML=`
<span onclick="copyText(this,'${text.replace(/'/g,"")}')">📋</span>
<span>👍</span>
<span>👎</span>
<span>⋯</span>
`;
msg.appendChild(actions);
}

function copyText(el,text){
navigator.clipboard.writeText(text);
el.textContent="✔";
setTimeout(()=>el.textContent="📋",1000);
}

function showTyping(){
const t=document.createElement("div");
t.className="typing";
t.id="typing";
t.innerHTML="<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
chat.appendChild(t);

const think=document.createElement("div");
think.className="thinking";
think.id="thinking";
think.textContent="Думаю";
chat.appendChild(think);
}

function removeTyping(){
document.getElementById("typing")?.remove();
document.getElementById("thinking")?.remove();
}

function generateResponse(text){
text=text.toLowerCase();

const dictionary={
"привет":"Привет 😎 Чем займёмся?",
"кто ты":"Я DeepCore. Локальный ИИ нового поколения 🚀",
"как дела":"Работаю стабильно. А у тебя как?",
"что умеешь":"Попробуй /help 😏",
"пока":"Не пропадай 👀",
};

if(dictionary[text])return dictionary[text];

if(text==="/help"){
return "Команды:\n/help\n/calc 2+2\n/reverse текст\n/count текст\n/translate hello";
}

if(text.startsWith("/calc")){
try{return eval(text.replace("/calc",""));}catch{return "Ошибка";}
}

if(text.startsWith("/reverse")){
return text.replace("/reverse","").split("").reverse().join("");
}

if(text.startsWith("/count")){
return "Символов: "+text.replace("/count","").length;
}

if(text.startsWith("/translate")){
return "Перевод работает в демо режиме 🌐";
}

if(text.includes("миша"))return "Создатель легенды 😎";

return "Интересно... расскажи подробнее.";
}
</script>

</body>
  </html>
