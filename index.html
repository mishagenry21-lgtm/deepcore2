<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore 3.6</title>

<style>
:root{
--bg:#111;
--input:#1b1b1b;
--text:#ffffff;
--user:#d9d9d9;
--accent:#ffffff;
}

.light{
--bg:#f4f4f4;
--input:#ffffff;
--text:#000000;
--user:#dcdcdc;
--accent:#000000;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
transition:0.3s;
}

header{
padding:15px;
text-align:center;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #444;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin:10px 0;
max-width:80%;
white-space:pre-wrap;
line-height:1.6;
}

.user{
background:var(--user);
color:#000;
padding:10px 14px;
border-radius:14px;
margin-left:auto;
}

.bot{
padding:4px 0;
}

.inputArea{
padding:12px;
border-top:1px solid #444;
}

.inputBox{
display:flex;
gap:8px;
align-items:center;
background:var(--input);
border:1px solid var(--accent);
border-radius:30px;
padding:8px 14px;
}

#messageInput{
flex:1;
background:transparent;
border:none;
outline:none;
color:var(--text);
font-size:16px;
}

button{
cursor:pointer;
border-radius:50%;
width:36px;
height:36px;
border:1px solid var(--accent);
background:transparent;
color:var(--text);
}

#sendBtn{
display:none;
background:var(--accent);
color:var(--bg);
}

.thinking{
font-style:italic;
opacity:0.7;
margin:5px 0;
}
</style>
</head>
<body>

<header>
<span>DeepCore 🚀</span>
<button onclick="toggleTheme()">🌓</button>
</header>

<div id="chat"></div>

<div class="inputArea">
<div class="inputBox">
<button onclick="alert('Плюс работает 😎')">+</button>
<button onclick="thinkMode()">🧠</button>
<input id="messageInput" autocomplete="off">
<button id="sendBtn">➤</button>
</div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

let thinkingEnabled=false;

function toggleTheme(){
document.body.classList.toggle("light");
}

function addMessage(text,type){
const div=document.createElement("div");
div.className="message "+type;
chat.appendChild(div);

if(type==="bot"){
typeWriter(div,text);
}else{
div.textContent=text;
}

chat.scrollTop=chat.scrollHeight;
}

function typeWriter(el,text){
let i=0;
function typing(){
if(i<text.length){
el.textContent+=text[i];
i++;
setTimeout(typing,18);
}
}
typing();
}

function thinkMode(){
thinkingEnabled=!thinkingEnabled;
alert("Режим думать: "+(thinkingEnabled?"ВКЛ":"ВЫКЛ"));
}

function generateResponse(msg){
msg=msg.toLowerCase();

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

const dictionary = {

"привет": () => random([
"Кого я вижу! 😎",
"О, привет! А я как раз заказывал пиццу, тебе кусочек? 🍕",
"Ну наконец-то! А то я уже заскучал.",
"Привет! Как там жизнь молодая?",
"Мир твоему дому!",
"Доброго времени суток!",
"Мое почтение.",
"Приветствую!",
"Здравствуй(те)!",
"Салют!",
"Здарова!",
"Хай!",
"О, какие люди!",
"Здорово, коль не шутишь.",
"Йо!",
"Привет-привет!"
]),

"здарова": () => dictionary["привет"](),
"хай": () => dictionary["привет"](),
"йо": () => dictionary["привет"](),

"как дела": () => random([
"Дела — как сажа бела? Шучу, отлично! 😄",
"Лучше всех, а жаловаться грех!",
"Идут потихоньку, ладно хоть не ползком.",
"Как в сказке: чем дальше, тем страшнее! 😅",
"Как у белого человека в пятницу вечером.",
"Нормально, как в автобусе — трясет, но едем.",
"Жду зарплату/лето/понедельник (нужное подчеркнуть).",
"В полном порядке, даже не спрашивай!",
"Да бывает по-всякому, но держусь.",
"Могло быть лучше, но судя по всему — не сегодня.",
"Если честно — устал как собака.",
"Всё сложно... но интересно!",
"Дела у прокурора, а у меня делишки. А у тебя?",
"Есть две новости: хорошая и плохая. С какой начнем?",
"А что, уже спрашивают?",
"Жаловаться не буду, но похвастаться нечем. А у тебя как?"
]),

"непонятно": () => random([
"Что именно тебе интересно? Могу развернуть мысль.",
"Ага, вот тут самый сок! Короче, дело было так...",
"В двух словах и не расскажешь, но если хочешь, могу загрузить подробностями.",
"Давай остановимся на этом поподробнее, потому что это важно.",
"Чувствую, что ты хочешь спросить: \"А что было дальше?\"",
"Прости, ты сказал что-то важное? Я заслушался соловьями.",
"Переспроси, пожалуйста, а то я ушел в себя и скоро вернусь.",
"Вы меня смутили своей загадочностью. Можно чуть понятнее?",
"Давай-ка поподробнее, а то я не уловил суть.",
"Повтори, я ослышался (или завис на пару секунд).",
"Ты сейчас издал такой звук, что мой внутренний словарь дал сбой. Расшифруй.",
"Интересно, конечно, но не хочешь ли ты спросить меня о чём-то конкретном?",
"А можно ту же мысль, только в студию?",
"Кстати, о птичках...",
"Пока не забыл...",
"А как тебе вообще такая погода?",
"Слушай, а что ты думаешь по поводу...",
"Переводя стрелки с больной головы на здоровую..."
])

}; 

if(dictionary[msg]) return dictionary[msg];

if(msg==="/help"){
return "Команды:\n/help\n/bigresponse\nПример калькулятора: 5+5";
}

if(msg==="/bigresponse"){
return "Квантовая физика — это сложная область науки.\nОна изучает мир элементарных частиц.\nРаботает иначе чем классическая физика.\nСодержит суперпозицию и запутанность.\nИменно она лежит в основе современных технологий.";
}

if(/^\d+[\+\-\*\/]\d+$/.test(msg)){
return eval(msg).toString();
}

if(msg===""){
return "Скажи что-нибудь 😎";
}

return "Интересно 🤔 Расскажи подробнее.";
}

function sendMessage(){
let msg=input.value.trim();
if(!msg) return;

addMessage(msg,"user");
input.value="";
sendBtn.style.display="none";

if(thinkingEnabled){
const think=document.createElement("div");
think.className="thinking";
think.textContent="DeepCore думает...";
chat.appendChild(think);
chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{
think.remove();
let response=generateResponse(msg);
addMessage(response,"bot");
},2000);

}else{
setTimeout(()=>{
let response=generateResponse(msg);
addMessage(response,"bot");
},600);
}
}

sendBtn.onclick=sendMessage;

input.addEventListener("input",()=>{
sendBtn.style.display=input.value.trim()?"block":"none";
});

input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

addMessage("Привет, я DeepCore 😎","bot");
addMessage("Чем могу помочь вам сегодня?","bot");
</script>

</body>
  </html>
