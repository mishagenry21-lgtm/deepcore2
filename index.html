<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore v5</title>

<style>
:root{
--bg:#e6e6e6;
--text:#000;
--user:#dcdcdc;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
overflow:hidden;
}

/* Overlay */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.3);
display:none;
z-index:4;
}

/* Sidebar */
.sidebar{
width:260px;
background:#f2f2f2;
position:fixed;
left:-260px;
top:0;
height:100%;
padding:15px;
transition:.3s;
z-index:5;
display:flex;
flex-direction:column;
gap:10px;
overflow-y:auto;
}

.sidebar.active{
left:0;
}

.sidebar button{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

/* Main */
.main{
flex:1;
display:flex;
flex-direction:column;
width:100%;
}

header{
display:flex;
justify-content:space-between;
padding:12px;
}

.icon{
width:36px;
height:36px;
border-radius:50%;
border:1px solid #888;
background:white;
cursor:pointer;
}

/* Chat */
#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
}

.logo{
text-align:center;
opacity:.3;
margin-top:40px;
}

.msg{
max-width:75%;
font-size:15px;
opacity:0;
animation:fadeIn 1s forwards;
white-space:pre-wrap;
}

@keyframes fadeIn{
from{opacity:0;filter:brightness(0);}
to{opacity:1;filter:brightness(1);}
}

.user{
align-self:flex-end;
background:var(--user);
padding:10px 14px;
border-radius:16px;
}

.bot{
align-self:flex-start;
}

/* Typing */
.typing{
display:flex;
gap:5px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:#000;
animation:bounce 1.4s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-6px);}
}

/* Footer */
footer{
display:flex;
gap:6px;
padding:10px;
}

input{
flex:1;
padding:10px;
border-radius:12px;
border:1px solid #ccc;
outline:none;
}

#send{
opacity:.5;
transition:.3s;
}

#send.active{
opacity:1;
}
</style>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
<button onclick="newChat()">➕ Новый чат</button>
<div id="chatList"></div>
<button onclick="fake()">Изображения</button>
<button onclick="fake()">Приложения</button>
<button onclick="fake()">Новый проект</button>
</div>

<div class="main">
<header>
<button class="icon" onclick="openSidebar()">☰</button>
<div>DeepCore</div>
<button class="icon">🌓</button>
</header>

<div id="chat">
<div class="logo">
<h2>Привет, я DeepCore</h2>
<p>Чем могу помочь вам сегодня?</p>
</div>
</div>

<footer>
<input id="input" placeholder="Спросить DeepCore">
<button id="send">➤</button>
</footer>
</div>

<script>
const input=document.getElementById("input");
const send=document.getElementById("send");
const chat=document.getElementById("chat");
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");
const chatList=document.getElementById("chatList");

let chats=JSON.parse(localStorage.getItem("deepcore_v5"))||[];
let currentChat=[];
let lastUserMessage="";

function save(){
localStorage.setItem("deepcore_v5",JSON.stringify(chats));
renderChats();
}

function renderChats(){
chatList.innerHTML="";
chats.forEach((c,i)=>{
let btn=document.createElement("button");
btn.textContent=c[0]?.text?.slice(0,20)||"Чат";
btn.onclick=()=>loadChat(i);
chatList.appendChild(btn);
});
}

function newChat(){
if(currentChat.length){
chats.push(currentChat);
save();
}
currentChat=[];
chat.innerHTML="";
closeSidebar();
}

function loadChat(i){
chat.innerHTML="";
currentChat=chats[i];
currentChat.forEach(m=>addMsg(m.text,m.role,false));
closeSidebar();
}

function openSidebar(){
sidebar.classList.add("active");
overlay.style.display="block";
}

function closeSidebar(){
sidebar.classList.remove("active");
overlay.style.display="none";
}

function fake(){
alert("У DeepCore пока нет такой функции 😅");
}

input.addEventListener("input",()=>{
send.classList.toggle("active",input.value.trim());
});

send.onclick=()=>{
if(!input.value.trim())return;
addMsg(input.value,"user");
currentChat.push({role:"user",text:input.value});
lastUserMessage=input.value.toLowerCase();
input.value="";
showTyping();
setTimeout(()=>{
removeTyping();
let r=generate(lastUserMessage);
addMsg(r,"bot");
currentChat.push({role:"bot",text:r});
},3000);
};

function addMsg(text,type){
const msg=document.createElement("div");
msg.className="msg "+type;
msg.textContent=text;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
const t=document.createElement("div");
t.className="typing";
t.id="typing";
t.innerHTML="<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
chat.appendChild(t);
}

function removeTyping(){
document.getElementById("typing")?.remove();
}

/* ===== УМНЫЙ МОЗГ ===== */

const helloResponses=[
"Кого я вижу!",
"Ну наконец-то! А то я уже заскучал.",
"Йо!",
"Мир твоему дому!",
"Салют!"
];

const howResponses=[
"Лучше всех, а жаловаться грех!",
"Как в автобусе — трясет, но едем.",
"Да бывает по-всякому, но держусь."
];

const unclearResponses=[
"Давай-ка поподробнее, а то я не уловил суть.",
"Ты сейчас издал такой звук, что мой словарь дал сбой 😅",
"Можно чуть понятнее?"
];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(t){

if(t.includes("привет")) return random(helloResponses);
if(t.includes("как дела")) return random(howResponses);

if(/^[0-9+\-*/(). ]+$/.test(t)){
try{return eval(t);}catch{return "Ошибка вычисления";}
}

if(t.length<3) return random(unclearResponses);

if(t.includes("?")){
return "Интересный вопрос 🤔 Дай секунду подумать... Пока могу сказать: всё возможно.";
}

return random(unclearResponses);
}

renderChats();
</script>

</body>
  </html>
