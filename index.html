<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore AI</title>

<style>
:root{
--bg:#ffffff;
--text:#000000;
--accent:#10a37f;
--input:#f1f1f1;
}
.dark{
--bg:#0f172a;
--text:#ffffff;
--accent:#10a37f;
--input:#1e293b;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
transition:.3s;
}

header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
position:relative;
}

#menuBtn{
cursor:pointer;
font-size:20px;
}

#dropdown{
position:absolute;
right:15px;
top:55px;
background:var(--input);
padding:10px;
border-radius:10px;
display:none;
flex-direction:column;
gap:5px;
}

#dropdown button{
background:none;
border:none;
cursor:pointer;
color:var(--text);
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.centerText{
margin:auto;
text-align:center;
opacity:.6;
}

.message{
max-width:80%;
padding:12px 16px;
border-radius:15px;
animation:fadeIn .25s ease forwards;
opacity:0;
transform:translateY(10px);
}

.user{
background:var(--accent);
color:#fff;
align-self:flex-end;
}

.bot{
background:var(--input);
align-self:flex-start;
}

@keyframes fadeIn{
to{opacity:1;transform:translateY(0);}
}

footer{
display:flex;
padding:10px;
gap:10px;
background:var(--bg);
}

input{
flex:1;
padding:12px;
border-radius:12px;
border:none;
background:var(--input);
color:var(--text);
outline:none;
}

#sendBtn{
display:flex;
align-items:center;
justify-content:center;
background:var(--accent);
color:#fff;
border:none;
border-radius:12px;
padding:0 16px;
cursor:pointer;
opacity:0;
transform:scale(.8);
transition:.2s;
}

#sendBtn.show{
opacity:1;
transform:scale(1);
}

.typingDots span{
animation:blink 1s infinite;
}
.typingDots span:nth-child(2){animation-delay:.2s;}
.typingDots span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
0%,100%{opacity:.2}
50%{opacity:1}
}
</style>
</head>
<body class="dark">

<header>
<div>DeepCore AI</div>
<div id="menuBtn">☰</div>
<div id="dropdown">
<button onclick="toggleTheme()">Сменить тему</button>
<button onclick="toggleThinking()">Думать: <span id="thinkState">OFF</span></button>
</div>
</header>

<div id="chat">
<div class="centerText">
<h2>Привет, я DeepCore</h2>
<p>Чем могу помочь вам сегодня?</p>
</div>
</div>

<footer>
<input id="input">
<button id="sendBtn">➤</button>
</footer>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const sendBtn=document.getElementById("sendBtn");
const dropdown=document.getElementById("dropdown");
const thinkState=document.getElementById("thinkState");

let thinking=false;

/* ====== АНИМАЦИЯ ФРАЗ В ПОЛЕ ВВОДА ====== */

const placeholderPhrases=[
"Напиши что-нибудь умное 😎",
"Спроси меня о чём угодно...",
"/help — посмотреть команды",
"/Bigresponse — большой ответ",
"Расширяй мой словарь 🔥"
];

let phraseIndex=0;
let charIndex=0;
let deleting=false;

function animatePlaceholder(){
let currentPhrase=placeholderPhrases[phraseIndex];

if(!deleting){
input.setAttribute("placeholder",currentPhrase.slice(0,charIndex++));
if(charIndex>currentPhrase.length){
setTimeout(()=>deleting=true,1000);
}
}else{
input.setAttribute("placeholder",currentPhrase.slice(0,charIndex--));
if(charIndex===0){
deleting=false;
phraseIndex=(phraseIndex+1)%placeholderPhrases.length;
}
}

setTimeout(animatePlaceholder,deleting?40:70);
}

animatePlaceholder();

/* ====== МЕНЮ ====== */

document.getElementById("menuBtn").onclick=()=>{
dropdown.style.display=dropdown.style.display==="flex"?"none":"flex";
dropdown.style.display="flex";
};

function toggleTheme(){
document.body.classList.toggle("dark");
}

function toggleThinking(){
thinking=!thinking;
thinkState.textContent=thinking?"ON":"OFF";
}

/* ====== КНОПКА ====== */

input.addEventListener("input",()=>{
if(input.value.trim()){
sendBtn.classList.add("show");
}else{
sendBtn.classList.remove("show");
}
});

sendBtn.onclick=sendMessage;
input.addEventListener("keypress",(e)=>{
if(e.key==="Enter") sendMessage();
});

/* ====== СООБЩЕНИЯ ====== */

function sendMessage(){
let text=input.value.trim();
if(!text) return;

addMessage(text,"user");
input.value="";
sendBtn.classList.remove("show");

if(text==="/help"){
setTimeout(()=>addMessage("Команды:\n/help\n/Bigresponse","bot"),500);
return;
}

if(text==="/Bigresponse"){
setTimeout(()=>typeBotResponse("Это большой ответ DeepCore. Ты можешь расширять словарь и делать меня умнее 😎"),1000);
return;
}

simulateThinking(()=>{
let response=generateResponse(text);
typeBotResponse(response);
});
}

function addMessage(text,type){
let msg=document.createElement("div");
msg.className="message "+type;
msg.textContent=text;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
}

function simulateThinking(callback){
let msg=document.createElement("div");
msg.className="message bot";
if(thinking){
msg.textContent="Думаю...";
}else{
msg.innerHTML='<div class="typingDots"><span>.</span><span>.</span><span>.</span></div>';
}
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{
msg.remove();
callback();
},5000);
}

function typeBotResponse(text){
let msg=document.createElement("div");
msg.className="message bot";
chat.appendChild(msg);

let i=0;
function typing(){
if(i<text.length){
msg.textContent+=text[i++];
chat.scrollTop=chat.scrollHeight;
setTimeout(typing,18);
}
}
typing();
}

function generateResponse(text){
let dictionary={
"привет":"Привет, бро 😎",
"как дела":"Всё чётко, DeepCore на связи 💥",
"кто ты":"Я DeepCore AI."
};

for(let key in dictionary){
if(text.toLowerCase().includes(key)){
return dictionary[key];
}
}

return "Интересный вопрос... 😏";
}
</script>

</body>
  </html>
