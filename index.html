<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore v6</title>

<style>
:root{
--bg:#e6e6e6;
--text:#000;
--user:#dcdcdc;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:12px;
}

.icon{
width:36px;
height:36px;
border-radius:50%;
border:1px solid #888;
background:white;
cursor:pointer;
}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
}

.logo{
text-align:center;
opacity:.3;
margin-top:40px;
}

.msg{
max-width:75%;
font-size:15px;
white-space:pre-wrap;
line-height:1.5;
}

.user{
align-self:flex-end;
background:var(--user);
padding:10px 14px;
border-radius:16px;
}

.bot{
align-self:flex-start;
}

/* ACTIONS */
.actions{
display:flex;
gap:6px;
margin-top:6px;
}

.actions span{
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #000;
background:#fff;
cursor:pointer;
font-size:13px;
}

/* TYPING DOTS */
.typing{
display:flex;
gap:5px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:#000;
animation:bounce 1.4s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-6px);}
}

/* FOOTER */
footer{
display:flex;
gap:6px;
padding:10px;
position:relative;
}

input{
flex:1;
padding:10px;
border-radius:12px;
border:1px solid #ccc;
outline:none;
}

#send{
opacity:.5;
transition:.3s;
}

#send.active{
opacity:1;
}

/* PLUS MENU */
.plusMenu{
position:absolute;
bottom:60px;
left:10px;
background:#fff;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
padding:10px;
display:none;
flex-direction:column;
gap:6px;
z-index:10;
}

.plusMenu button{
border:none;
background:none;
padding:6px;
text-align:left;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div>DeepCore</div>
</header>

<div id="chat">
<div class="logo">
<h2>Привет, я DeepCore</h2>
<p>Чем могу помочь вам сегодня?</p>
</div>
</div>

<footer>
<button class="icon" onclick="togglePlus()">＋</button>

<div class="plusMenu" id="plusMenu">
<button onclick="fake()">📷 Фотографии</button>
<button onclick="fake()">📸 Камера</button>
<button onclick="fake()">📁 Файлы</button>
<button onclick="fake()">🎨 Создать изображение</button>
<button onclick="fake()">🧠 Думаю</button>
<button onclick="fake()">🔬 Глубокое исследование</button>
<button onclick="fake()">🛍 Поиск покупок</button>
<button onclick="fake()">🌐 Поиск в сети</button>
<button onclick="fake()">📚 Учеба и обучение</button>
<button onclick="fake()">❓ Викторины</button>
<button onclick="fake()">🧩 Исследовать приложения</button>
</div>

<input id="input" placeholder="Спросить DeepCore">
<button id="send">➤</button>
</footer>

<script>
const input=document.getElementById("input");
const send=document.getElementById("send");
const chat=document.getElementById("chat");

input.addEventListener("input",()=>{
send.classList.toggle("active",input.value.trim());
});

send.onclick=()=>{
if(!input.value.trim())return;
addUser(input.value);
let text=input.value;
input.value="";
showTyping();
setTimeout(()=>{
removeTyping();
let response=generate(text.toLowerCase());
typeMessage(response);
},3000);
};

function addUser(text){
const msg=document.createElement("div");
msg.className="msg user";
msg.textContent=text;
chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
}

function typeMessage(text){
const msg=document.createElement("div");
msg.className="msg bot";
chat.appendChild(msg);

let i=0;
function typing(){
if(i<text.length){
msg.textContent+=text.charAt(i);
i++;
chat.scrollTop=chat.scrollHeight;
setTimeout(typing,15);
}else{
addActions(msg);
}
}
typing();
}

function addActions(msg){
const act=document.createElement("div");
act.className="actions";
act.innerHTML="<span>📋</span><span>👍</span><span>👎</span><span>⋯</span>";
msg.appendChild(act);
}

function showTyping(){
const t=document.createElement("div");
t.className="typing";
t.id="typing";
t.innerHTML="<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
chat.appendChild(t);
}

function removeTyping(){
document.getElementById("typing")?.remove();
}

function togglePlus(){
const menu=document.getElementById("plusMenu");
menu.style.display=menu.style.display==="flex"?"none":"flex";
}

function fake(){
alert("У DeepCore пока нет такой функции 😅");
}

/* ===== МОЗГ ===== */

const unclear=[
"Давай-ка поподробнее, а то я не уловил суть.",
"Можно чуть понятнее?",
"Ты сейчас издал звук, который мой словарь не понял 😅",
"Переспроси, пожалуйста.",
"Чувствую, мысль интересная, но я её не поймал."
];

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(t){

if(t==="/help"){
return `Я DeepCore 😎
Мои функции:
/help
/Big response
• Калькулятор
• Текст наоборот
• Переводчик (демо)

Я развиваюсь 😈`;
}

if(t==="/big response"){
return `Квантовый компьютер — это вычислительная система нового поколения.

В отличие от обычных компьютеров,
которые используют биты (0 или 1),

квантовый компьютер использует кубиты.

Кубиты могут находиться сразу в нескольких состояниях
благодаря явлению суперпозиции.

Также существует запутанность —
когда кубиты связаны между собой,
даже если находятся далеко друг от друга.

Это позволяет выполнять
огромное количество вычислений одновременно.

Такие компьютеры особенно полезны
для сложных задач оптимизации,

моделирования молекул,
криптографии,

и научных исследований.

Однако технология всё ещё развивается,
и массовое применение только впереди.`;
}

if(/^[0-9+\-*/(). ]+$/.test(t)){
try{return eval(t);}catch{return "Ошибка вычисления";}
}

return random(unclear);
}
</script>

</body>
  </html>
