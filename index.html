<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore</title>

<style>
:root{
--bg:#111;
--input:#1b1b1b;
--text:#ffffff;
--user:#d9d9d9;
--border:#ffffff33;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:15px;
text-align:center;
font-weight:bold;
border-bottom:1px solid var(--border);
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin:12px 0;
white-space:pre-wrap;
line-height:1.6;
}

.user{
background:var(--user);
color:#000;
padding:10px 14px;
border-radius:12px;
max-width:80%;
margin-left:auto;
}

.bot{
max-width:90%;
}

.actions{
display:flex;
gap:12px;
margin-top:6px;
opacity:0.8;
}

.actions span{
cursor:pointer;
border:1px solid #fff;
border-radius:50%;
padding:6px;
font-size:14px;
}

.inputArea{
padding:12px;
border-top:1px solid var(--border);
background:var(--bg);
}

.inputBox{
display:flex;
align-items:center;
gap:10px;
background:var(--input);
border:1px solid #fff;
border-radius:30px;
padding:10px 15px;
}

#messageInput{
flex:1;
background:transparent;
border:none;
outline:none;
color:#fff;
font-size:16px;
}

#sendBtn{
display:none;
background:#fff;
color:#000;
border:none;
border-radius:50%;
width:36px;
height:36px;
cursor:pointer;
}

#plusBtn{
background:transparent;
border:1px solid #fff;
border-radius:50%;
width:36px;
height:36px;
color:#fff;
cursor:pointer;
}

.thinking{
display:flex;
gap:5px;
margin-top:10px;
}

.dot{
width:8px;
height:8px;
background:#fff;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

.typing span{
opacity:0;
animation:fadeIn .03s forwards;
}

@keyframes fadeIn{
to{opacity:1}
}
</style>
</head>
<body>

<header>DeepCore 🚀</header>

<div id="chat"></div>

<div class="inputArea">
<div class="inputBox">
<button id="plusBtn">+</button>
<input id="messageInput" autocomplete="off">
<button id="sendBtn">➤</button>
</div>
</div>

<script>
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const chat = document.getElementById("chat");

const phrases = [
"DeepCore не спит",
"DeepCore лучший друг ChatGPT",
"DeepCore рил мощный ИИ, да да",
"Кстати, DeepCore сейчас модель 5",
"DeepCore шарит",
"DeepCore крутой"
];

let phraseIndex = 0;

function animatePlaceholder(){
let text = phrases[phraseIndex];
let i=0;
input.placeholder="";
let typing = setInterval(()=>{
if(i<text.length){
input.placeholder+=text[i];
i++;
}else{
clearInterval(typing);
setTimeout(()=>{
erasePlaceholder();
},10000);
}
},50);
}

function erasePlaceholder(){
let text = input.placeholder;
let i=text.length;
let erase = setInterval(()=>{
if(i>0){
input.placeholder=text.substring(0,i-1);
i--;
}else{
clearInterval(erase);
phraseIndex=(phraseIndex+1)%phrases.length;
setTimeout(animatePlaceholder,500);
}
},30);
}

animatePlaceholder();

input.addEventListener("input",()=>{
sendBtn.style.display = input.value.trim() ? "block":"none";
});

function addMessage(text, sender){
const div = document.createElement("div");
div.className="message "+sender;

if(sender==="bot"){
typeText(div,text);
}else{
div.textContent=text;
}
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function typeText(element,text){
let i=0;
element.innerHTML="";
let span;
function type(){
if(i<text.length){
span=document.createElement("span");
span.textContent=text[i];
element.appendChild(span);
i++;
setTimeout(type,15);
}else{
addActions(element);
}
}
type();
}

function addActions(element){
const actions=document.createElement("div");
actions.className="actions";
actions.innerHTML="⬜ 👍 👎 🔄";
element.appendChild(actions);
}

function thinkingAnimation(callback){
const thinking=document.createElement("div");
thinking.className="thinking";
thinking.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
chat.appendChild(thinking);
chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{
thinking.remove();
callback();
},4000);
}

function generateResponse(msg){
msg=msg.toLowerCase();

if(msg==="/help"){
return `Я DeepCore 😎

Мои функции:
/help
✖️ Калькулятор
Текст наоборот
Переводчик

Я развиваюсь 😈`;
}

if(msg==="/bigresponse"){
return `Квантовая физика — это раздел физики, изучающий поведение частиц на микроскопическом уровне.
Она описывает мир атомов и элементарных частиц.
Законы классической физики там не работают привычным образом.
Частицы могут вести себя как волны.
Они могут находиться в нескольких состояниях одновременно.
Существует явление суперпозиции.
Также есть квантовая запутанность.
Это означает связь частиц независимо от расстояния.
Квантовые эффекты лежат в основе современной электроники.
Лазеры, транзисторы и МРТ работают благодаря этим законам.
Квантовая теория изменила наше понимание реальности.
Она объясняет строение атома.
Помогает моделировать молекулы.
Используется в разработке квантовых компьютеров.
Хотя теория сложная, она экспериментально подтверждена.
Это одна из самых точных теорий в истории науки.
Но до сих пор остаётся много загадок.
Учёные продолжают исследования.
Будущее квантовых технологий выглядит многообещающе.`;
}

if(/^\d+[\+\-\*\/]\d+$/.test(msg)){
return eval(msg).toString();
}

return "Интересный вопрос 😎 Расскажи подробнее.";
}

function sendMessage(){
let msg=input.value.trim();
if(!msg) return;

addMessage(msg,"user");
input.value="";
sendBtn.style.display="none";

thinkingAnimation(()=>{
let response=generateResponse(msg);
addMessage(response,"bot");
});
}

sendBtn.onclick=sendMessage;
input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});
</script>

</body>
</html>
