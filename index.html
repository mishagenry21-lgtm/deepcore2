<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore 4.0</title>

<style>
:root{
--bg:#111;
--input:#1b1b1b;
--text:#fff;
--accent:#fff;
--bubble:#2a2a2a;
}

.light{
--bg:#f4f4f4;
--input:#ffffff;
--text:#000;
--accent:#000;
--bubble:#e5e5e5;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
transition:.3s;
}

header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #444;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
}

.centerHello{
margin:auto;
text-align:center;
opacity:.9;
}

.message{
margin:8px 0;
max-width:80%;
white-space:pre-wrap;
line-height:1.5;
}

.user{
background:var(--bubble);
padding:10px 14px;
border-radius:14px;
margin-left:auto;
}

.bot{
padding:4px 0;
}

.inputArea{
padding:12px;
border-top:1px solid #444;
}

.inputBox{
display:flex;
align-items:center;
gap:8px;
background:var(--input);
border-radius:30px;
padding:8px 14px;
border:1px solid var(--accent);
}

#messageInput{
flex:1;
background:transparent;
border:none;
outline:none;
color:var(--text);
font-size:16px;
}

button{
width:36px;
height:36px;
border-radius:50%;
border:1px solid var(--accent);
background:transparent;
color:var(--text);
cursor:pointer;
}

#sendBtn{
display:none;
background:var(--accent);
color:var(--bg);
}

.typingDots span{
display:inline-block;
width:6px;
height:6px;
margin:0 2px;
background:var(--text);
border-radius:50%;
animation:jump 1s infinite;
}

.typingDots span:nth-child(2){animation-delay:.2s}
.typingDots span:nth-child(3){animation-delay:.4s}

@keyframes jump{
0%,80%,100%{transform:translateY(0)}
40%{transform:translateY(-6px)}
}

.plusMenu{
position:absolute;
bottom:70px;
left:20px;
background:var(--input);
border:1px solid var(--accent);
border-radius:12px;
padding:10px;
display:none;
flex-direction:column;
gap:8px;
}
</style>
</head>
<body>

<header>
<span>DeepCore 🚀</span>
<button onclick="toggleTheme()">🌓</button>
</header>

<div id="chat">
<div class="centerHello" id="hello">
<h2>Привет, я DeepCore 😎</h2>
<p>Чем могу помочь вам сегодня?</p>
</div>
</div>

<div class="inputArea">
<div class="inputBox">
<button onclick="togglePlus()">+</button>
<button onclick="toggleThink()">🧠</button>
<input id="messageInput" autocomplete="off">
<button id="sendBtn">➤</button>
</div>
</div>

<div class="plusMenu" id="plusMenu">
<button onclick="alert('Загрузка файла')">📎</button>
<button onclick="alert('Галерея')">🖼</button>
<button onclick="alert('Голосовой ввод')">🎤</button>
<button onclick="alert('Настройки DeepCore')">⚙</button>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("messageInput");
const sendBtn=document.getElementById("sendBtn");
const hello=document.getElementById("hello");

let thinking=false;

function toggleTheme(){
document.body.classList.toggle("light");
}

function togglePlus(){
const menu=document.getElementById("plusMenu");
menu.style.display=menu.style.display==="flex"?"none":"flex";
}

function toggleThink(){
thinking=!thinking;
alert("Режим думать: "+(thinking?"ВКЛ":"ВЫКЛ"));
}

function addMessage(text,type){
hello.style.display="none";
const div=document.createElement("div");
div.className="message "+type;
chat.appendChild(div);

if(type==="bot") typeWriter(div,text);
else div.textContent=text;

chat.scrollTop=chat.scrollHeight;
}

function typeWriter(el,text){
let i=0;
function type(){
if(i<text.length){
el.textContent+=text[i++];
setTimeout(type,18);
}
}
type();
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generateResponse(msg){
msg=msg.toLowerCase();

if(msg.includes("привет")||msg.includes("здарова")||msg.includes("хай")||msg.includes("йо")){
return random([
"Кого я вижу! 😎",
"О, привет! А я как раз заказывал пиццу, тебе кусочек? 🍕",
"Ну наконец-то! А то я уже заскучал.",
"Привет! Как там жизнь молодая?",
"Мир твоему дому!",
"Доброго времени суток!",
"Мое почтение.",
"Приветствую!",
"Салют!"
]);
}

if(msg.includes("как дела")){
return random([
"Дела — как сажа бела? Шучу, отлично! 😄",
"Лучше всех, а жаловаться грех!",
"Нормально, как в автобусе — трясет, но едем.",
"Всё сложно... но интересно!",
"Есть две новости: хорошая и плохая. С какой начнем?"
]);
}

if(msg.length<2){
return random([
"Повтори, я завис на секунду 😅",
"Можно чуть понятнее?",
"Расшифруй, а то словарь дал сбой."
]);
}

return "Интересно 🤔 Расскажи подробнее.";
}

function showThinking(callback){
if(thinking){
const think=document.createElement("div");
think.className="message bot";
think.textContent="Думаю...";
chat.appendChild(think);
chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{
think.remove();
callback();
},2000);

}else{
const dots=document.createElement("div");
dots.className="message bot typingDots";
dots.innerHTML="<span></span><span></span><span></span>";
chat.appendChild(dots);
chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{
dots.remove();
callback();
},5000);
}
}

function sendMessage(){
let msg=input.value.trim();
if(!msg) return;

addMessage(msg,"user");
input.value="";
sendBtn.style.display="none";

showThinking(()=>{
addMessage(generateResponse(msg),"bot");
});
}

sendBtn.onclick=sendMessage;

input.addEventListener("input",()=>{
sendBtn.style.display=input.value?"block":"none";
});

input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

/* Печатающиеся подсказки */
const phrases=[
"Напиши 'привет' 😎",
"Спроси: как дела?",
"Попробуй что-нибудь неожиданное...",
"DeepCore думает быстрее чем кажется 🚀"
];

let phraseIndex=0;
let charIndex=0;
let deleting=false;

function typePlaceholder(){
let current=phrases[phraseIndex];
if(!deleting){
input.placeholder=current.slice(0,++charIndex);
if(charIndex===current.length){
deleting=true;
setTimeout(typePlaceholder,1200);
return;
}
}else{
input.placeholder=current.slice(0,--charIndex);
if(charIndex===0){
deleting=false;
phraseIndex=(phraseIndex+1)%phrases.length;
}
}
setTimeout(typePlaceholder,60);
}

typePlaceholder();
</script>

</body>
  </html>
