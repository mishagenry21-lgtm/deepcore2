<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore 4.1</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
display:flex;
flex-direction:column;
height:100vh;
transition:0.3s;
}

/* ===== ТЕМЫ ===== */

body.white{background:#ffffff;color:#000;}
body.black{background:#000000;color:#fff;}
body.blue{background:#0f172a;color:#fff;}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
font-size:18px;
font-weight:bold;
}

#menuBtn{cursor:pointer;}

#menu{
position:absolute;
right:15px;
top:60px;
background:#222;
padding:15px;
border-radius:10px;
display:none;
flex-direction:column;
gap:10px;
z-index:10;
}

#menu button{
background:none;
border:none;
color:white;
cursor:pointer;
text-align:left;
}

/* ===== ЧАТ ===== */

#chat{
flex:1;
padding:20px;
overflow-y:auto;
white-space:pre-wrap;
}

.message{
margin-bottom:15px;
animation:fadeIn 0.5s ease;
}

.me{
font-weight:bold;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* ===== ПОЛЕ ВВОДА ===== */

#inputArea{
display:flex;
padding:10px;
gap:10px;
}

#plus{
font-size:20px;
cursor:pointer;
}

#input{
flex:1;
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

#send{
padding:10px 15px;
cursor:pointer;
border:none;
border-radius:10px;
}

/* ===== ПРЫГАЮЩИЕ ТОЧКИ ===== */

.dots span{
animation:bounce 1s infinite;
display:inline-block;
}

.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}
</style>
</head>

<body class="black">

<header>
DeepCore
<div id="menuBtn">⋮</div>
</header>

<div id="menu">
<button onclick="setTheme('white')">Белая</button>
<button onclick="setTheme('blue')">Синяя</button>
<button onclick="setTheme('black')">Чёрная</button>
<button onclick="toggleThinking()">Думать: <span id="thinkState">OFF</span></button>
</div>

<div id="chat"></div>

<div id="inputArea">
<div id="plus" onclick="plusMenu()">＋</div>
<input id="input" placeholder="DeepCore не спит">
<button id="send" onclick="send()">➤</button>
</div>

<script>

/* ===== СЛОВАРНЫЙ ЗАПАС ===== */

const greetings = [
"Кого я вижу! 😎",
"О, привет! А я как раз заказывал пиццу, тебе кусочек? 🍕",
"Ну наконец-то! А то я уже заскучал.",
"Привет! Как там жизнь молодая?",
"Мир твоему дому!",
"Доброго времени суток!",
"Мое почтение.",
"Приветствую!",
"Здравствуй(те)!",
"Салют!",
"Здарова!",
"Хай!",
"О, какие люди!",
"Йо!",
"Привет-привет!"
];

const howAreYou = [
"Лучше всех, а жаловаться грех!",
"Нормально, как в автобусе — трясет, но едем.",
"Дела — как сажа бела? Шучу, отлично! 😄",
"Идут потихоньку, ладно хоть не ползком.",
"Как в сказке: чем дальше, тем страшнее! 😅",
"Жду зарплату/лето/понедельник (нужное подчеркнуть).",
"Всё сложно... но интересно!",
"Дела у прокурора, а у меня делишки. А у тебя?"
];

let thinking = false;

/* ===== МЕНЮ ===== */

document.getElementById("menuBtn").onclick = function(){
const menu = document.getElementById("menu");
menu.style.display = menu.style.display==="flex"?"none":"flex";
};

function setTheme(t){
document.body.className = t;
}

function toggleThinking(){
thinking = !thinking;
document.getElementById("thinkState").innerText = thinking?"ON":"OFF";
}

/* ===== ОТПРАВКА ===== */

function send(){
let input = document.getElementById("input");
let text = input.value.trim();
if(!text) return;

addMessage("Ты: "+text,"me");
input.value="";

if(thinking){
thinkingAnimation(text);
}else{
dotsAnimation(text);
}
}

/* ===== АНИМАЦИЯ ДУМАНИЯ ===== */

function thinkingAnimation(text){
let chat=document.getElementById("chat");

let msg=document.createElement("div");
msg.className="message";
chat.appendChild(msg);

let states=["Думаю","Продумываю ещё раз","Формулирую ответ"];
let i=0;

let interval=setInterval(()=>{
msg.innerText=states[i];
i++;
if(i>=states.length){
clearInterval(interval);
setTimeout(()=>typeAnswer(text,msg),1000);
}
},1500);
}

function dotsAnimation(text){
let chat=document.getElementById("chat");
let msg=document.createElement("div");
msg.className="message dots";
msg.innerHTML="<span>.</span><span>.</span><span>.</span>";
chat.appendChild(msg);

setTimeout(()=>typeAnswer(text,msg),4500);
}

/* ===== ПЕЧАТЬ ТЕКСТА ===== */

function typeAnswer(text,element){
let answer = generateAnswer(text);
element.innerText="";
let i=0;

let interval=setInterval(()=>{
element.innerText+=answer[i];
i++;
if(i>=answer.length) clearInterval(interval);
},15);
}

/* ===== ЛОГИКА ===== */

function generateAnswer(text){

if(text.toLowerCase()==="/help"){
return `Я - DeepCore. Меня так зовут, ведь я ИИ 😎

Мои функции:
• Переводчик
• Калькулятор
• Текст наоборот
• /Bigresponse

Словарный запас: Большой`;
}

if(text.toLowerCase()==="/bigresponse"){
return `Квантовый компьютер — это вычислительная система нового поколения.
Он работает не с битами, а с кубитами.
Кубит может быть 0 и 1 одновременно.
Это называется суперпозиция.
Также существует квантовая запутанность.
Она связывает кубиты между собой.
Благодаря этому вычисления идут параллельно.
Это даёт огромный прирост скорости.
Такие компьютеры могут моделировать молекулы.
Оптимизировать сложные процессы.
Разрабатывать новые лекарства.
Работать с криптографией.
Но технология ещё развивается.
Кубиты нестабильны.
Чувствительны к шуму.
Требуют сверхнизких температур.
Однако за ними будущее вычислений 🚀`;
}

if(text.toLowerCase().includes("привет")){
return greetings[Math.floor(Math.random()*greetings.length)];
}

if(text.toLowerCase().includes("как дела")){
return howAreYou[Math.floor(Math.random()*howAreYou.length)];
}

if(text.startsWith("переведи ")){
return text.replace("переведи ","");
}

if(text.startsWith("наоборот ")){
return text.replace("наоборот ","").split("").reverse().join("");
}

if(!isNaN(text)){
return "Ответ калькулятора: "+eval(text);
}

return "Интересный вопрос 😎";
}

/* ===== ПЛЮС МЕНЮ ===== */

function plusMenu(){
alert("У DeepCore пока нет такой функции 😅");
}

/* ===== ФРАЗЫ В ПОЛЕ ВВОДА ===== */

const placeholders=[
"DeepCore не спит",
"DeepCore крутой",
"Кстати, DeepCore 4.1 v7",
"Спрашивай что угодно",
"DeepCore шарит 😎",
"Попробуй /Bigresponse 🚀"
];

let phIndex=0;
let charIndex=0;
let deleting=false;
let input=document.getElementById("input");

function animatePlaceholder(){
let current=placeholders[phIndex];

if(!deleting){
input.placeholder=current.substring(0,charIndex++);
if(charIndex>current.length){
deleting=true;
setTimeout(animatePlaceholder,1000);
return;
}
}else{
input.placeholder=current.substring(0,charIndex--);
if(charIndex===0){
deleting=false;
phIndex=(phIndex+1)%placeholders.length;
}
}
setTimeout(animatePlaceholder,80);
}

animatePlaceholder();

</script>
</body>
  </html>
