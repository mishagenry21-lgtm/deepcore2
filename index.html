<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DeepCore AI</title>

<style>
body {
  margin: 0;
  background: #0d0d0d;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.user-message {
  align-self: flex-end;
  background: #19c37d;
  color: black;
  padding: 10px 14px;
  border-radius: 14px;
  max-width: 70%;
}

.bot-message {
  align-self: flex-start;
  background: #1e1e1e;
  padding: 10px 14px;
  border-radius: 14px;
  max-width: 70%;
  white-space: pre-wrap;
}

/* Анимация печати */
.typing {
  border-right: 2px solid #19c37d;
  animation: blink 0.8s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* Панель ввода */
form {
  display: flex;
  padding: 10px;
  background: #111;
  gap: 8px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1e1e1e;
  color: white;
  font-size: 15px;
}

button {
  border: none;
  padding: 12px 16px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

#send-btn {
  background: #19c37d;
}

#plus-btn {
  background: #2a2a2a;
  color: white;
}

/* Выпадающее меню */
#menu {
  position: absolute;
  bottom: 70px;
  right: 20px;
  background: #1e1e1e;
  border-radius: 10px;
  padding: 10px;
  display: none;
  flex-direction: column;
  gap: 5px;
}

#menu button {
  background: #2a2a2a;
  color: white;
}
</style>
</head>
<body>

<div id="chat"></div>

<div id="menu">
  <button onclick="insertText('/help')">/help</button>
  <button onclick="insertText('/Bigresponse')">/Bigresponse</button>
  <button onclick="insertText('DeepCore крутой')">Фраза</button>
</div>

<form id="chat-form">
  <button type="button" id="plus-btn">+</button>
  <input type="text" id="user-input" placeholder="DeepCore не спит..." autocomplete="off">
  <button type="submit" id="send-btn">➤</button>
</form>

<script>
const chat = document.getElementById("chat");
const form = document.getElementById("chat-form");
const input = document.getElementById("user-input");
const menu = document.getElementById("menu");
const plusBtn = document.getElementById("plus-btn");

/* ===== СЛОВАРЬ ===== */

const greetings = [
"Кого я вижу! 😎",
"Йо!",
"Салют!",
"Здарова!",
"О, какие люди!",
"Привет-привет!",
"Мир твоему дому!"
];

const howAreYou = [
"Лучше всех, а жаловаться грех!",
"Нормально, как в автобусе — трясет, но едем.",
"Всё сложно... но интересно!",
"Дела у прокурора, а у меня делишки. А у тебя?",
"Есть две новости: хорошая и плохая. С какой начнем?"
];

const unknownReplies = [
"Бро… ты сейчас на каком языке говорил? 😅",
"Я уловил сигнал, но смысл потерялся.",
"Повтори по-человечески 😎",
"DeepCore шарит, но не настолько.",
"Это был код? Или заклинание?"
];

/* ===== АНИМАЦИЯ ПЕЧАТИ ===== */

function typeText(element, text, speed = 18) {
  element.classList.add("typing");
  element.textContent = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      element.textContent += text.charAt(i);
      i++;
      setTimeout(typing, speed);
      chat.scrollTop = chat.scrollHeight;
    } else {
      element.classList.remove("typing");
    }
  }

  typing();
}

/* ===== ДОБАВЛЕНИЕ СООБЩЕНИЙ ===== */

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = sender === "user" ? "user-message" : "bot-message";
  chat.appendChild(msg);

  if (sender === "bot") {
    typeText(msg, text);
  } else {
    msg.textContent = text;
  }

  chat.scrollTop = chat.scrollHeight;
}

/* ===== ЛОГИКА ОТВЕТОВ ===== */

function generateResponse(text) {
  text = text.toLowerCase();

  if (text === "/help") {
    addMessage("Доступные команды:\n/help\n/Bigresponse\nПопробуй что-нибудь 😉", "bot");
    return;
  }

  if (text === "/bigresponse") {
    addMessage("🚀 BIG MODE АКТИВИРОВАН\n\nDeepCore 4.2 v7\nСистема стабильна.\nСловарный запас расширен.\nГотов к сложным вопросам.\nСпрашивай что-нибудь умное 😎", "bot");
    return;
  }

  if (text.includes("привет") || text.includes("йо") || text.includes("здарова")) {
    addMessage(randomFrom(greetings), "bot");
    return;
  }

  if (text.includes("как дела")) {
    addMessage(randomFrom(howAreYou), "bot");
    return;
  }

  addMessage(randomFrom(unknownReplies), "bot");
}

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/* ===== СОБЫТИЯ ===== */

form.addEventListener("submit", function(e) {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, "user");
  generateResponse(text);
  input.value = "";
});

plusBtn.addEventListener("click", function() {
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
});

function insertText(text) {
  input.value = text;
  menu.style.display = "none";
  input.focus();
}
</script>

</body>
  </html>
