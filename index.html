<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore</title>

<style>
:root{
--bg:#e6e6e6;
--text:#000;
--user:#d9d9d9;
--border:#fff;
}

.dark{
--bg:#0f0f0f;
--text:#fff;
--user:#2a2a2a;
--border:#fff;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
display:flex;
flex-direction:column;
transition:.3s;
}

header{
display:flex;
justify-content:space-between;
padding:12px;
}

button{
border-radius:50%;
border:1px solid var(--border);
background:var(--bg);
color:var(--text);
width:36px;
height:36px;
cursor:pointer;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.logo{
text-align:center;
opacity:.3;
margin-top:40px;
}

.msg{
max-width:75%;
font-size:15px;
animation:fade .3s ease forwards;
}

.user{
align-self:flex-end;
background:var(--user);
padding:10px 14px;
border-radius:16px;
}

.bot{
align-self:flex-start;
}

.actions{
display:flex;
gap:6px;
margin-top:5px;
}

.actions span{
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #fff;
background:var(--bg);
cursor:pointer;
font-size:13px;
}

footer{
display:flex;
gap:6px;
padding:10px;
}

input{
flex:1;
padding:10px;
border-radius:12px;
border:1px solid #ccc;
outline:none;
background:#fff;
}

#send{
opacity:.5;
transition:.3s;
}

#send.active{
opacity:1;
}

.typing{
display:flex;
gap:5px;
margin-left:5px;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:var(--text);
animation:bounce 1.4s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-6px);}
}

@keyframes fade{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<div>
<button onclick="toggleChats()">☰</button>
<button onclick="newChat()">＋</button>
</div>
<button onclick="toggleTheme()">🌓</button>
</header>

<div id="chat">
<div class="logo">
<h2>Привет, я DeepCore</h2>
<p>Чем могу помочь вам сегодня?</p>
</div>
</div>

<footer>
<input id="input" placeholder='Спросить DeepCore
"А вы знали что DeepCore создал Миша? 😎"
"DeepCore рил мощный ИИ"
"DeepCore лучший друг ChatGPT"'>
<button id="send">➤</button>
</footer>

<script>
const input=document.getElementById("input");
const send=document.getElementById("send");
const chat=document.getElementById("chat");

let chats=JSON.parse(localStorage.getItem("deepcore_chats"))||[];
let current=[];

function save(){
localStorage.setItem("deepcore_chats",JSON.stringify(chats));
}

function newChat(){
if(current.length){
chats.push(current);
save();
}
current=[];
chat.innerHTML="";
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

input.addEventListener("input",()=>{
send.classList.toggle("active",input.value.trim().length>0);
});

send.onclick=()=>{
if(!input.value.trim())return;
addMsg(input.value,"user");
current.push({u:input.value});
let text=input.value;
input.value="";
showTyping();
setTimeout(()=>{
removeTyping();
let r=generate(text);
addMsg(r,"bot",true);
current.push({b:r});
},4000);
};

function addMsg(text,type,actions=false){
const msg=document.createElement("div");
msg.className="msg "+type;
msg.textContent=text;
chat.appendChild(msg);

if(actions){
const act=document.createElement("div");
act.className="actions";
act.innerHTML="<span>📋</span><span>👍</span><span>👎</span><span>⋯</span>";
msg.appendChild(act);
}
chat.scrollTop=chat.scrollHeight;
}

function showTyping(){
const t=document.createElement("div");
t.className="typing";
t.id="typing";
t.innerHTML="<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
chat.appendChild(t);
}

function removeTyping(){
document.getElementById("typing")?.remove();
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(text){
let t=text.toLowerCase();

const hello=[
"Кого я вижу!",
"О, привет! А я как раз заказывал пиццу, тебе кусочек?",
"Ну наконец-то! А то я уже заскучал.",
"Привет! Как там жизнь молодая?",
"Мир твоему дому!",
"Доброго времени суток!",
"Мое почтение.",
"Приветствую!",
"Салют!",
"Йо!"
];

const how=[
"Лучше всех, а жаловаться грех!",
"Идут потихоньку, ладно хоть не ползком.",
"Как в автобусе — трясет, но едем.",
"В полном порядке!",
"Да бывает по-всякому, но держусь."
];

if(t.includes("привет")) return random(hello);
if(t.includes("как дела")) return random(how);

if(t==="/help"){
return `Я DeepCore 😎
Мои функции:
/help
• ✖️ Калькулятор
• Текст наоборот
• Переводчик

Я развиваюсь 😈`;
}

if(/^[0-9+\-*/(). ]+$/.test(t)){
try{return eval(t);}catch{return "Ошибка вычисления";}
}

if(t.startsWith("переверни")){
return t.replace("переверни","").split("").reverse().join("");
}

if(t.startsWith("переведи")){
return "🌐 Переводчик в демо режиме.";
}

return "Интересно... расскажи подробнее.";
}
</script>

</body>
  </html>
