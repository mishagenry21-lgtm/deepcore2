<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepCore</title>

<style>
:root{
--bg:#ffffff;
--text:#000000;
--border:#000000;
--input:#f3f3f3;
}

.dark{
--bg:#0f0f0f;
--text:#ffffff;
--border:#ffffff;
--input:#1a1a1a;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
transition:0.3s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
border-bottom:1px solid var(--border);
}

button{
background:none;
border:1px solid var(--border);
color:var(--text);
padding:6px 12px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:10px 14px;
border-radius:15px;
animation:fadeIn 0.4s ease forwards;
white-space:pre-wrap;
}

.user{
align-self:flex-end;
border:1px solid var(--border);
}

.bot{
align-self:flex-start;
border:1px solid var(--border);
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.typing{
display:flex;
gap:5px;
align-self:flex-start;
}

.dot{
width:6px;
height:6px;
border-radius:50%;
background:var(--text);
animation:bounce 1s infinite;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);}
40%{transform:translateY(-6px);}
}

footer{
display:flex;
padding:10px;
gap:5px;
border-top:1px solid var(--border);
}

input{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--input);
color:var(--text);
outline:none;
transition:0.3s;
}

#send{
background:gray;
color:black;
}

#send.active{
background:white;
color:black;
}
</style>
</head>

<body>

<header>
<div>
<button onclick="toggleMenu()">☰</button>
<button onclick="newChat()">＋</button>
</div>
<button onclick="toggleTheme()">🌓</button>
</header>

<div id="chat"></div>

<footer>
<button onclick="fakeUpload()">＋</button>
<input id="input" placeholder="Спросить DeepCore">
<button id="send" disabled>➤</button>
</footer>

<script>
const input = document.getElementById("input");
const send = document.getElementById("send");
const chat = document.getElementById("chat");

const randomHints = [
"А вы знали что DeepCore сделал Миша? 😎",
"DeepCore это рил мощный ИИ, да да",
"DeepCore лучший друг ChatGPT",
"Попробуй написать /help",
"DeepCore не спит 👀"
];

setInterval(()=>{
if(Math.random() < 0.25){
input.placeholder = randomHints[Math.floor(Math.random()*randomHints.length)];
}else{
input.placeholder = "Спросить DeepCore";
}
},4000);

input.addEventListener("input",()=>{
if(input.value.trim() !== ""){
send.disabled=false;
send.classList.add("active");
}else{
send.disabled=true;
send.classList.remove("active");
}
});

send.onclick = ()=>{
if(!input.value.trim()) return;

addMessage(input.value,"user");
const text = input.value;
input.value="";
send.disabled=true;
send.classList.remove("active");

showTyping();

setTimeout(()=>{
removeTyping();
addMessage(generateResponse(text),"bot");
},1200);
};

function addMessage(text,type){
const msg = document.createElement("div");
msg.className="msg "+type;
chat.appendChild(msg);
let i=0;
const interval=setInterval(()=>{
msg.textContent += text[i];
i++;
if(i>=text.length) clearInterval(interval);
},15);
chat.scrollTop = chat.scrollHeight;
}

function showTyping(){
const typing = document.createElement("div");
typing.className="typing";
typing.id="typing";
typing.innerHTML="<div class='dot'></div><div class='dot'></div><div class='dot'></div>";
chat.appendChild(typing);
chat.scrollTop = chat.scrollHeight;
}

function removeTyping(){
document.getElementById("typing")?.remove();
}

function generateResponse(text){
text=text.toLowerCase();

if(text==="/help"){
return "Команды:\n/help\n/calc 2+2\n/reverse текст\n/count текст\n/translate hello";
}

if(text.startsWith("/calc")){
try{
return eval(text.replace("/calc",""));
}catch{
return "Ошибка в выражении";
}
}

if(text.startsWith("/reverse")){
return text.replace("/reverse","").split("").reverse().join("");
}

if(text.startsWith("/count")){
return "Количество символов: "+text.replace("/count","").length;
}

if(text.startsWith("/translate")){
return "Перевод: (пока базовый режим 😅)";
}

return "DeepCore думает... 🤖";
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

function fakeUpload(){
alert("У DeepCore пока нет такой функции 😅");
}

function toggleMenu(){
alert("У DeepCore пока нет такой функции 😅");
}

function newChat(){
chat.innerHTML="";
}
</script>

</body>
  </html>
